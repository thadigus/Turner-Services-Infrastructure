###############################################
## /roles/windows-base-config/tasks/main.yml ##
###############################################
#
# Role for all Windows base configuration.

---
- name: Create turneradmin User
  win_user:
    name: turneradmin
    password: '{{ win_turneradmin_passwd | default(lookup("env", "TS_WIN_TURNERADMIN_PASSWD")) }}'
    state: present
    groups:
      - Administrators

