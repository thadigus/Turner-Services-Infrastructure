###############################
## /images/download-isos.yml ##
###############################
#
# Download all of the ISOs necessary for the image builds:
# - RHEL 9
# - Ubuntu Latest LTS
# - Kali Linux
# - Windows Server Latest
# - Proxmox Backup Server
---
- name: Find a reachable Proxmox host
  hosts: optimus_cluster
  gather_facts: false
  tasks:
    - name: Probe host reachability
      ping:
      register: prox_probe
      ignore_errors: true
      ignore_unreachable: true

- name: Select one reachable host for ISO downloads
  hosts: localhost
  gather_facts: false
  vars:
    cluster_hosts: "{{ groups['optimus_cluster'] | default([]) }}"
  tasks:
    - name: Build list of reachable hosts
      set_fact:
        reachable_optimus_hosts: "{{ (reachable_optimus_hosts | default([])) + [item] }}"
      loop: "{{ cluster_hosts }}"
      when:
        - hostvars[item].prox_probe is defined
        - hostvars[item].prox_probe.ping is defined
        - hostvars[item].prox_probe.ping == "pong"

    - name: Fail if no Proxmox host is reachable
      fail:
        msg: "No reachable hosts found in optimus_cluster."
      when: (reachable_optimus_hosts | default([]) | length) == 0

    - name: Choose first reachable Proxmox host
      add_host:
        name: "{{ reachable_optimus_hosts[0] }}"
        groups: iso_download_target

    - name: Show selected ISO download host
      debug:
        msg: "Using {{ reachable_optimus_hosts[0] }} for ISO downloads."

- name: Download and Verify ISOs
  hosts: iso_download_target
  gather_facts: false
  become: true
  tasks:
    - name: Download Ubuntu Live Server ISO
      get_url:
        url: "https://releases.ubuntu.com/24.04.3/ubuntu-24.04.3-live-server-amd64.iso"
        checksum: "sha256:c3514bf0056180d09376462a7a1b4f213c1d6e8ea67fae5c25099c6fd3d8274b"
        dest: "/mnt/pve/NFS-TempStorage/template/iso/ubuntu-live-server.iso"

    - name: Download Kali Linux ISO
      get_url:
        url: "https://cdimage.kali.org/kali-2025.3/kali-linux-2025.3-installer-amd64.iso"
        checksum: "sha256:fcf1999799f6642b7d6c6bd79bc1e516be7340b7203fe86c6be3ac21f693f42a"
        dest: "/mnt/pve/NFS-TempStorage/template/iso/kali-linux-installer.iso"

    - name: Fetch Proxmox ISO index
      ansible.builtin.uri:
        url: "https://enterprise.proxmox.com/iso/"
        return_content: true
      register: proxmox_iso_index

    - name: Parse latest Proxmox Backup Server ISO metadata
      ansible.builtin.set_fact:
        pbs_iso_matches: >-
          {{
            proxmox_iso_index.content
            | regex_findall('(proxmox-backup-server_[0-9][^<\s]*\.iso)[\s\S]*?SHA256:\s*([a-f0-9]{64})')
          }}

    - name: Fail if Proxmox Backup Server ISO metadata cannot be parsed
      ansible.builtin.fail:
        msg: "Could not find Proxmox Backup Server ISO metadata at https://enterprise.proxmox.com/iso/."
      when: (pbs_iso_matches | length) == 0

    - name: Select latest Proxmox Backup Server ISO
      ansible.builtin.set_fact:
        pbs_iso_name: "{{ pbs_iso_matches[0][0] }}"
        pbs_iso_checksum: "{{ pbs_iso_matches[0][1] }}"

    - name: Show selected Proxmox Backup Server ISO
      ansible.builtin.debug:
        msg: "Downloading {{ pbs_iso_name }} with sha256:{{ pbs_iso_checksum }}"

    - name: Download latest Proxmox Backup Server ISO
      ansible.builtin.get_url:
        url: "https://enterprise.proxmox.com/iso/{{ pbs_iso_name }}"
        checksum: "sha256:{{ pbs_iso_checksum }}"
        dest: "/mnt/pve/NFS-TempStorage/template/iso/proxmox-backup-server.iso"

    - name: Download Windows Server 2025 ISO
      get_url:
        url: "https://software-static.download.prss.microsoft.com/dbazure/888969d5-f34g-4e03-ac9d-1f9786c66749/26100.1742.240906-0331.ge_release_svc_refresh_SERVER_EVAL_x64FRE_en-us.iso"
        dest: "/mnt/pve/NFS-TempStorage/template/iso/WindowsServer2025_x64_en-us.iso"

    - name: Download VirtIO Windows Drivers
      get_url:
        url: "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso"
        dest: "/mnt/pve/NFS-TempStorage/template/iso/virtio-win.iso"
