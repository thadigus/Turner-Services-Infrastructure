########################################################
## /services/k8s-cluster/cluster-bootstrap.yml        ##
########################################################
# Shared bootstrap for Kubernetes clusters using kubeadm/containerd.

---
- name: Prepare Kubernetes nodes
  hosts: "{{ k8s_control_host_pattern }}:{{ k8s_worker_host_pattern }}"
  become: yes
  gather_facts: yes
  vars_files:
    - ../../turner-services-sensitive-repo/k8s-vars.yml
  vars:
    k8s_channel_version: "{{ lookup('ansible.builtin.env', 'K8S_CHANNEL_VERSION') | default('1.35', true) | trim }}"
    k8s_pause_image: "{{ lookup('ansible.builtin.env', 'K8S_PAUSE_IMAGE') | default('k8s.gcr.io/pause:3.9', true) | trim }}"
  tasks:
    - name: Install Kubernetes node dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
          - containerd
        state: present
        update_cache: true

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Disable swap in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(?!#)([^\n]*\s+swap\s+[^\n]*)$'
        replace: '# \1'

    - name: Delete lvswap Logical Volume if it exists
      lvol:
        vg: vgroot
        lv: lvswap
        state: absent
        force: true
    
    - name: Ensure required Kubernetes kernel modules are loaded
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - br_netfilter
        - overlay
    
    - name: Configure required Kubernetes sysctl settings
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: "net.ipv4.ip_forward", value: "1" }
        - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { name: "vm.overcommit_memory", value: "1" }
        - { name: "kernel.panic", value: "10" }
        - { name: "kernel.panic_on_oops", value: "1" }
    
    - name: Allow Kubernetes control plane and node traffic via UFW
      ansible.builtin.ufw:
        rule: allow
        proto: tcp
        port: "{{ item.port }}"
        from_ip: 10.0.3.0/24
      loop:
        - { port: 6443 }    # Kubernetes API server
        - { port: 2379 }    # etcd client
        - { port: 2380 }    # etcd server peer
        - { port: 10250 }   # Kubelet API
        - { port: 10251 }   # kube-scheduler
        - { port: 10252 }   # kube-controller-manager
        - { port: 10255 }   # Read-only kubelet metrics (if needed)

    - name: Ensure apt keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install Kubernetes apt repository key
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_channel_version }}/deb/Release.key"
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: "0644"

    - name: Configure Kubernetes apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v{{ k8s_channel_version }}/deb/ /"
        filename: kubernetes
        state: present

    - name: Install kubeadm stack packages
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true

    - name: Ensure containerd config directory exists
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Write Kubernetes-compatible containerd config
      ansible.builtin.copy:
        dest: /etc/containerd/config.toml
        mode: "0644"
        content: |
          version = 2

          [plugins."io.containerd.grpc.v1.cri"]
            sandbox_image = "{{ k8s_pause_image }}"

            [plugins."io.containerd.grpc.v1.cri".containerd]
              default_runtime_name = "runc"

              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes]
                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
                  runtime_type = "io.containerd.runc.v2"
                  [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
                    SystemdCgroup = true
      notify: Restart containerd

    - name: Validate containerd config
      ansible.builtin.command:
        cmd: containerd --config /etc/containerd/config.toml config dump
      changed_when: false

    - name: Enable and start containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: started

    - name: Enable kubelet service
      ansible.builtin.systemd:
        name: kubelet
        enabled: true
        state: started

  handlers:
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted

