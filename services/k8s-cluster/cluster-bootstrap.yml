- name: Join worker nodes
  hosts: "{{ k8s_worker_host_pattern }}"
  become: yes
  gather_facts: yes
  tasks:
    # - name: Validate first control host is discoverable for join token refresh
    #   ansible.builtin.assert:
    #     that:
    #       - hostvars['localhost'].k8s_first_control_host_resolved is defined
    #       - hostvars['localhost'].k8s_first_control_host_resolved | length > 0
    #     fail_msg: "Unable to determine first control host for worker join token refresh."
    #   run_once: true
    #   delegate_to: localhost

    - name: Refresh worker join command from current control plane
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: k8s_join_cmd_refresh
      changed_when: false
      run_once: true
      delegate_to: "{{ hostvars['localhost'].k8s_first_control_host_resolved }}"

    - name: Store refreshed worker join command
      ansible.builtin.set_fact:
        k8s_join_command_worker_refreshed: "{{ k8s_join_cmd_refresh.stdout | trim }}"
      run_once: true
      delegate_to: localhost
      delegate_facts: true

    - name: Check if node already joined as worker
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: k8s_worker_join_state

    - name: Wait for Kubernetes API endpoint from worker
      ansible.builtin.wait_for:
        host: "{{ hostvars['localhost'].k8s_kube_control_endpoint_local | regex_replace(':.*$', '') }}"
        port: "{{ (hostvars['localhost'].k8s_kube_control_endpoint_local | regex_search(':(\\d+)$', '\\1') | first | default('6443')) | int }}"
        timeout: 300
      when: not k8s_worker_join_state.stat.exists

    - name: Join node to cluster with recovery
      block:
        - name: Join node to cluster (primary attempt)
          ansible.builtin.command:
            cmd: "{{ hostvars['localhost'].k8s_join_command_worker_refreshed }}"
          register: k8s_worker_join_result
          retries: 3
          delay: 20
          until: k8s_worker_join_result.rc == 0
      rescue:
        - name: Reset worker kubeadm state after failed join
          ansible.builtin.command:
            cmd: kubeadm reset -f
          changed_when: true

        - name: Recreate worker CNI config directory after reset
          ansible.builtin.file:
            path: /etc/cni/net.d
            state: directory
            owner: root
            group: root
            mode: "0755"

        - name: Join node to cluster (retry after reset)
          ansible.builtin.command:
            cmd: "{{ hostvars['localhost'].k8s_join_command_worker_refreshed }}"
      when: not k8s_worker_join_state.stat.exists

- name: Save kubeconfig for external use
  hosts: "{{ k8s_control_host_pattern }}"
  become: yes
  gather_facts: yes
  vars_files:
    - ../../turner-services-sensitive-repo/k8s-vars.yml
  vars:
    k8s_first_control_host: "{{ ansible_play_hosts_all | first }}"
    k8s_config_local_path: "../../turner-services-sensitive-repo/kubeconfigs"
  tasks:
    - name: Ensure local kubeconfig directory exists
      delegate_to: localhost
      become: false
      file:
        path: "{{ k8s_config_local_path }}"
        state: directory
        mode: '0700'

    - name: Pull kubeconfig from control plane to Ansible runner
      become: true
      fetch:
        src: /etc/kubernetes/admin.conf
        dest: "{{ k8s_config_local_path }}/{{ k8s_cluster_name }}.conf"
        flat: true

    - name: Restrict local kubeconfig permissions on Ansible runner
      delegate_to: localhost
      become: false
      file:
        path: "{{ k8s_config_local_path }}/{{ k8s_cluster_name }}.conf"
        mode: '0600'