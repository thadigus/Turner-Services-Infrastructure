- name: Initialize first control plane node
  hosts: "{{ k8s_control_host_pattern }}"
  become: yes
  gather_facts: yes
  vars_files:
    - ../../turner-services-sensitive-repo/k8s-vars.yml
  vars:
    k8s_first_control_host: "{{ ansible_play_hosts_all | first }}"
  tasks:
    - name: Ensure Kubernetes configuration directory exists on first control node
      file:
        path: /etc/kubernetes
        state: directory
        owner: root
        group: root
        mode: "0750"
      when: inventory_hostname == k8s_first_control_host

    - name: Ensure Kubernetes audit log directory exists
      file:
        path: /var/log/kubernetes/audit
        state: directory
        owner: root
        group: root
        mode: "0750"
      when: inventory_hostname == k8s_first_control_host

    - name: Install audit policy for API server
      copy:
        dest: /etc/kubernetes/audit-policy.yaml
        owner: root
        group: root
        mode: "0644"
        content: |
          apiVersion: audit.k8s.io/v1
          kind: Policy
          rules:
            - level: Metadata
      when: inventory_hostname == k8s_first_control_host

    - name: Write kubeadm init configuration
      copy:
        dest: /etc/kubernetes/kubeadm-config.yaml
        owner: root
        group: root
        mode: "0600"
        content: |
          apiVersion: kubeadm.k8s.io/v1beta4
          kind: InitConfiguration
          nodeRegistration:
            criSocket: unix:///run/containerd/containerd.sock
          ---
          apiVersion: kubeadm.k8s.io/v1beta4
          kind: ClusterConfiguration
          clusterName: "{{ k8s_cluster_name }}"
          kubernetesVersion: stable
          controlPlaneEndpoint: "{{ k8s_kube_control_endpoint }}"
          networking:
            podSubnet: "{{ k8s_pod_subnet }}"
            serviceSubnet: "{{ k8s_service_subnet }}"
          apiServer:
            extraArgs:
              - name: authorization-mode
                value: "Node,RBAC"
              - name: enable-admission-plugins
                value: "NodeRestriction,PodSecurity"
          controllerManager:
            extraArgs:
              - name: profiling
                value: "false"
          scheduler:
            extraArgs:
              - name: profiling
                value: "false"
          ---
          apiVersion: kubelet.config.k8s.io/v1beta1
          kind: KubeletConfiguration
          cgroupDriver: systemd
          serverTLSBootstrap: true
          rotateCertificates: true
          protectKernelDefaults: true
          readOnlyPort: 0
      when: inventory_hostname == k8s_first_control_host

    - name: Check if control plane already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: k8s_admin_conf
      when: inventory_hostname == k8s_first_control_host

    - name: Check health of existing control plane
      ansible.builtin.command:
        cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/readyz
      register: k8s_existing_apiserver_ready
      changed_when: false
      failed_when: false
      when:
        - inventory_hostname == k8s_first_control_host
        - k8s_admin_conf.stat.exists

    - name: Mark whether first control node needs kubeadm re-init
      ansible.builtin.set_fact:
        k8s_control_plane_needs_reinit: "{{ k8s_admin_conf.stat.exists and (k8s_existing_apiserver_ready.rc | default(1)) != 0 }}"
      when: inventory_hostname == k8s_first_control_host

    - name: Reset failed/partial kubeadm state on first control node
      ansible.builtin.command:
        cmd: kubeadm reset -f
      when:
        - inventory_hostname == k8s_first_control_host
        - k8s_control_plane_needs_reinit | default(false)

    - name: Clean stale CNI config after kubeadm reset
      ansible.builtin.file:
        path: /etc/cni/net.d
        state: absent
      when:
        - inventory_hostname == k8s_first_control_host
        - k8s_control_plane_needs_reinit | default(false)

    - name: Recreate CNI config directory
      ansible.builtin.file:
        path: /etc/cni/net.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      when:
        - inventory_hostname == k8s_first_control_host
        - k8s_control_plane_needs_reinit | default(false)

    - name: Initialize Kubernetes control plane
      ansible.builtin.command:
        cmd: kubeadm init --config /etc/kubernetes/kubeadm-config.yaml --upload-certs
      when:
        - inventory_hostname == k8s_first_control_host
        - (not k8s_admin_conf.stat.exists) or (k8s_control_plane_needs_reinit | default(false))

    - name: Ensure kubeconfig directory exists for root
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        owner: root
        group: root
        mode: "0700"
      when: inventory_hostname == k8s_first_control_host

    - name: Copy admin kubeconfig for service user
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        owner: root
        group: root
        mode: "0600"
      when: inventory_hostname == k8s_first_control_host

    - name: Ensure kubeconfig directory exists for service user
      ansible.builtin.file:
        path: /home/turnerans_svc/.kube
        state: directory
        owner: turnerans_svc
        group: turnerans_svc
        mode: "0700"
      when: inventory_hostname == k8s_first_control_host

    - name: Copy admin kubeconfig for service user
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/turnerans_svc/.kube/config
        remote_src: true
        owner: turnerans_svc
        group: turnerans_svc
        mode: "0600"
      when: inventory_hostname == k8s_first_control_host

    - name: Wait for Kubernetes API server to report ready
      ansible.builtin.command:
        cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/readyz
      register: k8s_apiserver_ready
      changed_when: false
      retries: 30
      delay: 10
      until: k8s_apiserver_ready.rc == 0
      when: inventory_hostname == k8s_first_control_host

    - name: Install Calico CNI
      ansible.builtin.command:
        cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.2/manifests/calico.yaml
      register: k8s_calico_apply
      changed_when: "'created' in k8s_calico_apply.stdout or 'configured' in k8s_calico_apply.stdout"
      retries: 6
      delay: 10
      until: k8s_calico_apply.rc == 0
      when: inventory_hostname == k8s_first_control_host

    - name: Set Calico IPv4 Pool CIDR
      ansible.builtin.command:
        cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf -n kube-system set env daemonset/calico-node CALICO_IPV4POOL_CIDR={{ k8s_pod_subnet }}
      when: inventory_hostname == k8s_first_control_host

    - name: Enforce restricted Pod Security level on default namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig /etc/kubernetes/admin.conf label namespace default
          pod-security.kubernetes.io/enforce=restricted
          pod-security.kubernetes.io/audit=restricted
          pod-security.kubernetes.io/warn=restricted
          --overwrite
      changed_when: false
      when: inventory_hostname == k8s_first_control_host

    - name: Ensure workloads namespace exists
      ansible.builtin.command:
        cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf create namespace workloads
      register: k8s_workloads_ns
      failed_when: k8s_workloads_ns.rc != 0 and ('AlreadyExists' not in k8s_workloads_ns.stderr)
      changed_when: "'created' in k8s_workloads_ns.stdout"
      when: inventory_hostname == k8s_first_control_host

    - name: Enforce restricted Pod Security on workloads namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig /etc/kubernetes/admin.conf label namespace workloads
          pod-security.kubernetes.io/enforce=restricted
          pod-security.kubernetes.io/audit=restricted
          pod-security.kubernetes.io/warn=restricted
          --overwrite
      changed_when: false
      when: inventory_hostname == k8s_first_control_host

    - name: Generate worker join command
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: k8s_join_cmd
      changed_when: false
      when: inventory_hostname == k8s_first_control_host

    - name: Generate control plane certificate key
      ansible.builtin.command:
        cmd: kubeadm init phase upload-certs --upload-certs
      register: k8s_upload_certs
      changed_when: false
      when: inventory_hostname == k8s_first_control_host

    - name: Save join commands for other plays
      ansible.builtin.set_fact:
        k8s_join_command_worker: "{{ k8s_join_cmd.stdout | trim }}"
        k8s_join_command_control: "{{ (k8s_join_cmd.stdout | trim) ~ ' --control-plane --certificate-key ' ~ ((k8s_upload_certs.stdout_lines | select('match', '^[a-f0-9]{64}$') | list | last) | default('')) }}"
      run_once: true
      delegate_to: localhost
      delegate_facts: true
      when: inventory_hostname == k8s_first_control_host

    - name: Validate control plane join command when multiple controllers exist
      ansible.builtin.assert:
        that:
          - hostvars['localhost'].k8s_join_command_control is match('.*--certificate-key\\s+[a-f0-9]{64}.*')
        fail_msg: "Failed to generate a valid control-plane join command with certificate key."
      run_once: true
      delegate_to: localhost
      when:
        - inventory_hostname == k8s_first_control_host
        - ansible_play_hosts_all | length > 1

    - name: Expose kube control endpoint for delegation
      set_fact:
        k8s_kube_control_endpoint_local: "{{ k8s_kube_control_endpoint }}"
        k8s_first_control_host_resolved: "{{ k8s_first_control_host }}"
      run_once: true
      delegate_to: localhost
      delegate_facts: true

