---
- name: Prepare Kubernetes nodes
  hosts: "{{ k8s_control_host_pattern }}:{{ k8s_worker_host_pattern }}"
  become: true
  gather_facts: true
  vars_files:
    - ../../turner-services-sensitive-repo/k8s-vars.yml
  vars:
    k8s_channel_version: "{{ lookup('ansible.builtin.env', 'K8S_CHANNEL_VERSION') | default('1.35', true) | trim }}"
    k8s_pause_image: "{{ lookup('ansible.builtin.env', 'K8S_PAUSE_IMAGE') | default('registry.k8s.io/pause:3.10', true) | trim }}"
  tasks:
    - name: Install Kubernetes node dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
          - containerd
        state: present
        update_cache: true

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Disable swap in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(?!#)([^\n]*\s+swap\s+[^\n]*)$'
        replace: '# \1'

    - name: Delete lvswap logical volume when present
      community.general.lvol:
        vg: vgroot
        lv: lvswap
        state: absent
        force: true
      when: ansible_lvm is defined and ansible_lvm.lvs.lvswap is defined

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
        persistent: present
      loop:
        - br_netfilter
        - overlay

    - name: Apply Kubernetes sysctl settings
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop:
        - { name: "net.ipv4.ip_forward", value: "1" }
        - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { name: "vm.overcommit_memory", value: "1" }
        - { name: "kernel.panic", value: "10" }
        - { name: "kernel.panic_on_oops", value: "1" }

    - name: Allow Kubernetes traffic from cluster subnet via UFW
      community.general.ufw:
        rule: allow
        proto: tcp
        port: "{{ item }}"
        from_ip: 10.0.3.0/24
      loop:
        - "6443"
        - "2379"
        - "2380"
        - "10250"
        - "10256"
        - "30000:32767"

    - name: Resolve control plane endpoint to VIP in /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^[0-9.]+\s+{{ k8s_kube_control_endpoint | regex_replace(":.*$", "") }}(\s|$)'
        line: "{{ k8s_kube_vip_address }} {{ k8s_kube_control_endpoint | regex_replace(':.*$', '') }}"
        state: present
      when: k8s_kube_vip_address is defined

    - name: Ensure apt keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install Kubernetes apt repository key
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_channel_version }}/deb/Release.key"
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: "0644"

    - name: Configure Kubernetes apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v{{ k8s_channel_version }}/deb/ /"
        filename: kubernetes
        state: present

    - name: Install kubeadm, kubelet, kubectl
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true

    - name: Ensure containerd config directory exists
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Write Kubernetes-compatible containerd config
      ansible.builtin.copy:
        dest: /etc/containerd/config.toml
        mode: "0644"
        content: |
          version = 2

          [plugins."io.containerd.grpc.v1.cri"]
            sandbox_image = "{{ k8s_pause_image }}"

            [plugins."io.containerd.grpc.v1.cri".containerd]
              default_runtime_name = "runc"

              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes]
                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
                  runtime_type = "io.containerd.runc.v2"
                  [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
                    SystemdCgroup = true
      notify: Restart containerd

    - name: Enable and start containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: started

    - name: Enable kubelet service
      ansible.builtin.systemd:
        name: kubelet
        enabled: true
        state: started

  handlers:
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted

- name: Install kube-vip static pod manifest on control nodes
  hosts: "{{ k8s_control_host_pattern }}"
  become: true
  gather_facts: true
  vars_files:
    - ../../turner-services-sensitive-repo/k8s-vars.yml
  vars:
    k8s_kube_vip_version: "{{ lookup('ansible.builtin.env', 'K8S_KUBE_VIP_VERSION') | default('v0.8.7', true) | trim }}"
  tasks:
    - name: Skip kube-vip when no VIP address is configured
      ansible.builtin.meta: end_host
      when: k8s_kube_vip_address is not defined or (k8s_kube_vip_address | default('') | length == 0)

    - name: Ensure static pod manifest directory exists
      ansible.builtin.file:
        path: /etc/kubernetes/manifests
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Pull kube-vip image into containerd
      ansible.builtin.command:
        cmd: "ctr --namespace k8s.io images pull ghcr.io/kube-vip/kube-vip:{{ k8s_kube_vip_version }}"
      changed_when: false

    - name: Render kube-vip static pod manifest
      ansible.builtin.command:
        cmd: >-
          ctr --namespace k8s.io run --rm --net-host
          ghcr.io/kube-vip/kube-vip:{{ k8s_kube_vip_version }} vip
          /kube-vip manifest pod
          --address {{ k8s_kube_vip_address }}
          --controlplane
          --services
          --arp
          --leaderElection
      register: k8s_kubevip_manifest
      changed_when: false

    - name: Install kube-vip static pod manifest
      ansible.builtin.copy:
        dest: /etc/kubernetes/manifests/kube-vip.yaml
        owner: root
        group: root
        mode: "0644"
        content: "{{ k8s_kubevip_manifest.stdout }}"

- name: Initialize and expand control plane
  hosts: "{{ k8s_control_host_pattern }}"
  become: true
  gather_facts: true
  serial: 1
  order: sorted
  vars_files:
    - ../../turner-services-sensitive-repo/k8s-vars.yml
  vars:
    k8s_control_hosts: "{{ query('ansible.builtin.inventory_hostnames', k8s_control_host_pattern) | sort }}"
    k8s_first_control_host: "{{ k8s_control_hosts | first }}"
    k8s_cert_sans: >-
      {{
        (
          ([k8s_kube_control_endpoint | regex_replace(':.*$', '')])
          + ([k8s_kube_vip_address] if k8s_kube_vip_address is defined else [])
          + (k8s_control_hosts | map('extract', hostvars, 'ansible_host') | list)
          + (k8s_control_hosts | list)
        ) | reject('equalto', '') | unique | list
      }}
  tasks:
    - name: Check whether this control node has joined the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: k8s_kubelet_conf

    - name: Query cluster node readiness from first control host
      ansible.builtin.shell:
        cmd: |
          kubectl --kubeconfig /etc/kubernetes/admin.conf get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: k8s_node_ready
      changed_when: false
      failed_when: false
      delegate_to: "{{ k8s_first_control_host }}"
      when:
        - inventory_hostname != k8s_first_control_host
        - k8s_kubelet_conf.stat.exists

    - name: Mark this node as already joined when kubelet.conf exists and node is Ready
      ansible.builtin.set_fact:
        k8s_already_joined: "{{ k8s_kubelet_conf.stat.exists and (k8s_node_ready.stdout | default('')) == 'True' }}"

    - name: Stat admin kubeconfig on first control host
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: k8s_admin_conf
      when: inventory_hostname == k8s_first_control_host

    - name: Probe apiserver readiness on first control host
      ansible.builtin.command:
        cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/readyz
      register: k8s_apiserver_probe
      changed_when: false
      failed_when: false
      when:
        - inventory_hostname == k8s_first_control_host
        - k8s_admin_conf.stat.exists

    - name: Refuse to proceed when first control host is initialized but unhealthy
      ansible.builtin.fail:
        msg: >-
          /etc/kubernetes/admin.conf exists on {{ inventory_hostname }} but the apiserver
          is not Ready. Re-running bootstrap will not recover this safely. Run the
          teardown playbook for this cluster, then retry.
      when:
        - inventory_hostname == k8s_first_control_host
        - k8s_admin_conf.stat.exists
        - (k8s_apiserver_probe.rc | default(1)) != 0

    - name: Ensure /etc/kubernetes exists on every control node
      ansible.builtin.file:
        path: /etc/kubernetes
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Write kubeadm InitConfiguration on first control host
      ansible.builtin.copy:
        dest: /etc/kubernetes/kubeadm-config.yaml
        owner: root
        group: root
        mode: "0600"
        content: |
          apiVersion: kubeadm.k8s.io/v1beta4
          kind: InitConfiguration
          nodeRegistration:
            criSocket: unix:///run/containerd/containerd.sock
            taints: []
          ---
          apiVersion: kubeadm.k8s.io/v1beta4
          kind: ClusterConfiguration
          clusterName: "{{ k8s_cluster_name }}"
          kubernetesVersion: stable
          controlPlaneEndpoint: "{{ k8s_kube_control_endpoint }}"
          networking:
            podSubnet: "{{ k8s_pod_subnet }}"
            serviceSubnet: "{{ k8s_service_subnet }}"
          apiServer:
            certSANs: {{ k8s_cert_sans | to_json }}
            extraArgs:
              - name: authorization-mode
                value: "Node,RBAC"
              - name: enable-admission-plugins
                value: "NodeRestriction,PodSecurity"
          controllerManager:
            extraArgs:
              - name: profiling
                value: "false"
          scheduler:
            extraArgs:
              - name: profiling
                value: "false"
          ---
          apiVersion: kubelet.config.k8s.io/v1beta1
          kind: KubeletConfiguration
          cgroupDriver: systemd
          serverTLSBootstrap: true
          rotateCertificates: true
          protectKernelDefaults: true
          readOnlyPort: 0
      when:
        - inventory_hostname == k8s_first_control_host
        - not k8s_admin_conf.stat.exists

    - name: Run kubeadm init on first control host
      ansible.builtin.command:
        cmd: kubeadm init --config /etc/kubernetes/kubeadm-config.yaml --upload-certs
      when:
        - inventory_hostname == k8s_first_control_host
        - not k8s_admin_conf.stat.exists

    - name: Ensure root kubeconfig directory exists on first control host
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        owner: root
        group: root
        mode: "0700"
      when: inventory_hostname == k8s_first_control_host

    - name: Install admin kubeconfig for root on first control host
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        owner: root
        group: root
        mode: "0600"
      when: inventory_hostname == k8s_first_control_host

    - name: Ensure kubeconfig directory exists for service user
      ansible.builtin.file:
        path: /home/turnerans_svc/.kube
        state: directory
        owner: turnerans_svc
        group: turnerans_svc
        mode: "0700"
      when: inventory_hostname == k8s_first_control_host

    - name: Install admin kubeconfig for service user
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/turnerans_svc/.kube/config
        remote_src: true
        owner: turnerans_svc
        group: turnerans_svc
        mode: "0600"
      when: inventory_hostname == k8s_first_control_host

    - name: Wait for apiserver to report Ready on first control host
      ansible.builtin.command:
        cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/readyz
      register: k8s_apiserver_ready
      changed_when: false
      retries: 30
      delay: 10
      until: k8s_apiserver_ready.rc == 0
      when: inventory_hostname == k8s_first_control_host

    - name: Check whether Calico is already installed
      ansible.builtin.command:
        cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf -n kube-system get daemonset calico-node --ignore-not-found -o name
      register: k8s_calico_check
      changed_when: false
      when: inventory_hostname == k8s_first_control_host

    - name: Apply Calico CNI manifest
      ansible.builtin.command:
        cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.2/manifests/calico.yaml
      register: k8s_calico_apply
      retries: 6
      delay: 10
      until: k8s_calico_apply.rc == 0
      when:
        - inventory_hostname == k8s_first_control_host
        - k8s_calico_check.stdout | default('') == ''

    - name: Configure Calico pod CIDR
      ansible.builtin.command:
        cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf -n kube-system set env daemonset/calico-node CALICO_IPV4POOL_CIDR={{ k8s_pod_subnet }}
      register: k8s_calico_cidr
      changed_when: "'env updated' in k8s_calico_cidr.stdout"
      when:
        - inventory_hostname == k8s_first_control_host
        - k8s_calico_check.stdout | default('') == ''

    - name: Enforce restricted Pod Security on default namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig /etc/kubernetes/admin.conf label namespace default
          pod-security.kubernetes.io/enforce=restricted
          pod-security.kubernetes.io/audit=restricted
          pod-security.kubernetes.io/warn=restricted
          --overwrite
      changed_when: false
      when: inventory_hostname == k8s_first_control_host

    - name: Ensure workloads namespace exists
      ansible.builtin.command:
        cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf create namespace workloads
      register: k8s_workloads_ns
      changed_when: "'created' in k8s_workloads_ns.stdout"
      failed_when:
        - k8s_workloads_ns.rc != 0
        - "'AlreadyExists' not in k8s_workloads_ns.stderr"
      when: inventory_hostname == k8s_first_control_host

    - name: Enforce restricted Pod Security on workloads namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig /etc/kubernetes/admin.conf label namespace workloads
          pod-security.kubernetes.io/enforce=restricted
          pod-security.kubernetes.io/audit=restricted
          pod-security.kubernetes.io/warn=restricted
          --overwrite
      changed_when: false
      when: inventory_hostname == k8s_first_control_host

    - name: Wait for control plane VIP to accept connections from joining nodes
      ansible.builtin.wait_for:
        host: "{{ k8s_kube_vip_address | default(hostvars[k8s_first_control_host].ansible_host) }}"
        port: 6443
        timeout: 300
      when:
        - inventory_hostname != k8s_first_control_host
        - not k8s_already_joined

    - name: Get fresh worker join command from first control host
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: k8s_join_cmd_fresh
      changed_when: false
      delegate_to: "{{ k8s_first_control_host }}"
      when:
        - inventory_hostname != k8s_first_control_host
        - not k8s_already_joined

    - name: Generate fresh control plane certificate key from first control host
      ansible.builtin.command:
        cmd: kubeadm init phase upload-certs --upload-certs
      register: k8s_certkey_fresh
      changed_when: false
      delegate_to: "{{ k8s_first_control_host }}"
      when:
        - inventory_hostname != k8s_first_control_host
        - not k8s_already_joined

    - name: Extract join token and CA cert hash from refreshed command
      ansible.builtin.set_fact:
        k8s_bootstrap_token: "{{ (k8s_join_cmd_fresh.stdout.split('--token ', 1)[1]).split()[0] }}"
        k8s_ca_cert_hash: "{{ (k8s_join_cmd_fresh.stdout.split('--discovery-token-ca-cert-hash ', 1)[1]).split()[0] }}"
        k8s_cert_key_value: "{{ k8s_certkey_fresh.stdout_lines | last | trim }}"
      when:
        - inventory_hostname != k8s_first_control_host
        - not k8s_already_joined

    - name: Write kubeadm JoinConfiguration for additional control nodes
      ansible.builtin.copy:
        dest: /etc/kubernetes/kubeadm-join.yaml
        owner: root
        group: root
        mode: "0600"
        content: |
          apiVersion: kubeadm.k8s.io/v1beta4
          kind: JoinConfiguration
          discovery:
            bootstrapToken:
              apiServerEndpoint: "{{ k8s_kube_control_endpoint }}"
              token: "{{ k8s_bootstrap_token }}"
              caCertHashes:
                - "{{ k8s_ca_cert_hash }}"
          nodeRegistration:
            criSocket: unix:///run/containerd/containerd.sock
            taints: []
          controlPlane:
            certificateKey: "{{ k8s_cert_key_value }}"
            localAPIEndpoint:
              advertiseAddress: "{{ ansible_default_ipv4.address }}"
              bindPort: 6443
      when:
        - inventory_hostname != k8s_first_control_host
        - not k8s_already_joined

    - name: Join this node to the control plane
      ansible.builtin.command:
        cmd: kubeadm join --config /etc/kubernetes/kubeadm-join.yaml
      register: k8s_control_join_result
      retries: 3
      delay: 20
      until: k8s_control_join_result.rc == 0
      when:
        - inventory_hostname != k8s_first_control_host
        - not k8s_already_joined

- name: Join worker nodes
  hosts: "{{ k8s_worker_host_pattern }}"
  become: true
  gather_facts: true
  vars_files:
    - ../../turner-services-sensitive-repo/k8s-vars.yml
  vars:
    k8s_first_control_host: "{{ query('ansible.builtin.inventory_hostnames', k8s_control_host_pattern) | sort | first }}"
  tasks:
    - name: Check whether this worker has joined the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: k8s_worker_kubelet_conf

    - name: Query worker node readiness from first control host
      ansible.builtin.shell:
        cmd: |
          kubectl --kubeconfig /etc/kubernetes/admin.conf get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: k8s_worker_ready
      changed_when: false
      failed_when: false
      delegate_to: "{{ k8s_first_control_host }}"
      when: k8s_worker_kubelet_conf.stat.exists

    - name: Mark worker as already joined when kubelet.conf exists and node is Ready
      ansible.builtin.set_fact:
        k8s_worker_already_joined: "{{ k8s_worker_kubelet_conf.stat.exists and (k8s_worker_ready.stdout | default('')) == 'True' }}"

    - name: Refresh worker join command from first control host
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: k8s_fresh_worker_join
      changed_when: false
      run_once: true
      delegate_to: "{{ k8s_first_control_host }}"

    - name: Wait for control plane endpoint to accept connections
      ansible.builtin.wait_for:
        host: "{{ (('https://' ~ k8s_kube_control_endpoint) | urlsplit('hostname')) }}"
        port: 6443
        timeout: 300
      when: not k8s_worker_already_joined

    - name: Join worker to cluster
      ansible.builtin.command:
        cmd: "{{ k8s_fresh_worker_join.stdout | trim }}"
      register: k8s_worker_join_result
      retries: 3
      delay: 20
      until: k8s_worker_join_result.rc == 0
      when: not k8s_worker_already_joined

- name: Verify cluster health and fetch kubeconfig
  hosts: "{{ k8s_control_host_pattern }}"
  become: true
  gather_facts: false
  run_once: true
  vars_files:
    - ../../turner-services-sensitive-repo/k8s-vars.yml
  vars:
    k8s_first_control_host: "{{ query('ansible.builtin.inventory_hostnames', k8s_control_host_pattern) | sort | first }}"
    k8s_expected_control_hosts: "{{ query('ansible.builtin.inventory_hostnames', k8s_control_host_pattern) | sort }}"
    k8s_expected_worker_hosts: "{{ query('ansible.builtin.inventory_hostnames', k8s_worker_host_pattern) | sort }}"
    k8s_config_local_path: "../../turner-services-sensitive-repo/kubeconfigs"
  tasks:
    - name: Assert every expected control node is Ready
      ansible.builtin.shell:
        cmd: |
          kubectl --kubeconfig /etc/kubernetes/admin.conf get node {{ item }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: k8s_control_readiness
      changed_when: false
      retries: 30
      delay: 10
      until: k8s_control_readiness.stdout == "True"
      delegate_to: "{{ k8s_first_control_host }}"
      loop: "{{ k8s_expected_control_hosts }}"

    - name: Assert every expected worker node is Ready
      ansible.builtin.shell:
        cmd: |
          kubectl --kubeconfig /etc/kubernetes/admin.conf get node {{ item }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: k8s_worker_readiness
      changed_when: false
      retries: 30
      delay: 10
      until: k8s_worker_readiness.stdout == "True"
      delegate_to: "{{ k8s_first_control_host }}"
      loop: "{{ k8s_expected_worker_hosts }}"

    - name: Assert control nodes are schedulable (no control-plane NoSchedule taint)
      ansible.builtin.shell:
        cmd: |
          kubectl --kubeconfig /etc/kubernetes/admin.conf get node {{ item }} -o jsonpath='{.spec.taints[?(@.key=="node-role.kubernetes.io/control-plane")].effect}'
      register: k8s_control_taint
      changed_when: false
      failed_when: k8s_control_taint.stdout != ""
      delegate_to: "{{ k8s_first_control_host }}"
      loop: "{{ k8s_expected_control_hosts }}"

    - name: Ensure local kubeconfig directory exists
      ansible.builtin.file:
        path: "{{ k8s_config_local_path }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: Fetch admin kubeconfig from first control host
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: "{{ k8s_config_local_path }}/{{ k8s_cluster_name }}.conf"
        flat: true
      delegate_to: "{{ k8s_first_control_host }}"

    - name: Restrict local kubeconfig permissions
      ansible.builtin.file:
        path: "{{ k8s_config_local_path }}/{{ k8s_cluster_name }}.conf"
        mode: "0600"
      delegate_to: localhost
      become: false
