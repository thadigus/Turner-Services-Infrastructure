environments:
  test:
    values:
      - environments/test.yaml.gotmpl
  prod:
    values:
      - environments/prod.yaml.gotmpl

---

helmDefaults:
  kubeContext: {{ .Values.kubeContext }}
  wait: true
  timeout: 600
  createNamespace: false

repositories:
  - name: kube-vip
    url: https://kube-vip.github.io/helm-charts
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: jetstack
    url: https://charts.jetstack.io

releases:
  - name: kube-vip-cloud-provider
    namespace: kube-system
    chart: kube-vip/kube-vip-cloud-provider
    version: 0.2.4
    labels:
      layer: platform
    values:
      - values/kube-vip-cloud-provider.yaml

  - name: kube-vip-cloud-provider-pool
    namespace: kube-system
    chart: ./raw
    labels:
      layer: platform
    needs:
      - kube-system/kube-vip-cloud-provider
    values:
      - values/kube-vip-cloud-provider-pool.yaml.gotmpl

  - name: ingress-nginx
    namespace: platform
    chart: ingress-nginx/ingress-nginx
    version: 4.11.3
    labels:
      layer: platform
    needs:
      - kube-system/kube-vip-cloud-provider-pool
    values:
      - values/ingress-nginx.yaml.gotmpl

  - name: cert-manager
    namespace: platform
    chart: jetstack/cert-manager
    version: v1.16.2
    labels:
      layer: platform
    values:
      - values/cert-manager.yaml

  # ClusterIssuer is a cert-manager CRD instance; must wait for the cert-manager
  # release (CRDs + webhook) before applying.
  - name: cluster-issuer-le
    namespace: platform
    chart: ./raw
    labels:
      layer: platform
    needs:
      - platform/cert-manager
    values:
      - values/cluster-issuer.yaml.gotmpl

  - name: code-server
    namespace: apps
    chart: ./raw
    labels:
      layer: apps
    values:
      - values/code-server.yaml.gotmpl
