name: K8S Apps

# Branch-driven IaC for the Helmfile catalog:
#   push to non-main  -> apply to test
#   push to main      -> apply to prod
#   daily schedule    -> apply to prod (drift correction)
#   workflow_dispatch -> manual override (env + optional bootstrap)

on:
  push:
    branches: ['**']
    paths:
      - 'services/k8s-apps/**'
      - 'scripts/run-k8s-app.sh'
      - '.github/workflows/k8s-apps.yml'
  schedule:
    - cron: '0 14 * * *'  # Daily at 14:00 UTC (1h after base-config-ansible)
  workflow_dispatch:
    inputs:
      env:
        description: Target cluster
        required: true
        type: choice
        options: [test, prod]
        default: prod
      bootstrap:
        description: Run bootstrap first
        required: false
        type: boolean
        default: false

concurrency:
  group: k8s-apps
  cancel-in-progress: false

jobs:
  apply:
    runs-on: self-hosted
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive

      # Docker's embedded DNS (127.0.0.11) doesn't know turnerservices.cloud
      # and overrides --dns when the runner attaches a user network. Hard-pin
      # cluster endpoints in /etc/hosts instead.
      - name: Pin internal cluster endpoints in /etc/hosts
        run: |
          {
            echo "10.0.3.5  k8s-control-prod.turnerservices.cloud"
            echo "10.0.3.118 k8s-test-control-01.turnerservices.cloud"
          } >> /etc/hosts

      - name: Resolve target env
        id: env
        run: |
          case "${{ github.event_name }}" in
            schedule)          name=prod ;;
            workflow_dispatch) name="${{ inputs.env }}" ;;
            push)
              if [ "${{ github.ref }}" = "refs/heads/main" ]; then
                name=prod
              else
                name=test
              fi ;;
            *) echo "Unhandled event ${{ github.event_name }}"; exit 1 ;;
          esac
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "Targeting ts-main-$name"

      - name: Materialize secrets from Proton Pass
        uses: ./.github/actions/materialize-secrets
        with:
          proton-pass-token: ${{ secrets.PROTON_PASS_ACCESS_TOKEN }}
          scope: k8s-apps
          kubeconfig-env: ${{ steps.env.outputs.name }}

      - name: bootstrap
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap }}
        run: scripts/run-k8s-app.sh bootstrap --env ${{ steps.env.outputs.name }}

      - name: helmfile apply
        run: scripts/run-k8s-app.sh apply --env ${{ steps.env.outputs.name }}

      # Container ran as root and wrote to the bind-mounted workspace. Hand
      # ownership back to the runner host user so the next checkout works.
      - name: Restore workspace ownership
        if: always()
        run: chown -R "$(stat -c '%u:%g' /__w)" "$GITHUB_WORKSPACE" || true
