name: Packer Images

# ISO download + Packer template builds. Depends on the devcontainer image
# (built by container-images.yml the day before) but does not re-build it.

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 1'  # Mondays at 04:30 UTC

jobs:
  download-isos:
    name: Download ISOs
    runs-on: self-hosted
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - run: ansible-playbook images/download-isos.yml

  ubuntu-packer-build:
    name: Ubuntu Packer Build
    runs-on: self-hosted
    needs: download-isos
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - run: |
          docker run --rm \
            --network host \
            --user root \
            -v "$PWD":/workspace \
            -w /workspace \
            ghcr.io/thadigus/turner-services-infrastructure:devcontainer \
            bash images/build-scripts/ubuntu-packer-build-rack.sh

  rhel-packer-build:
    name: RHEL Packer Build
    runs-on: self-hosted
    needs: download-isos
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - run: |
          docker run --rm \
            --network host \
            --user root \
            -v "$PWD":/workspace \
            -w /workspace \
            ghcr.io/thadigus/turner-services-infrastructure:devcontainer \
            bash images/build-scripts/rhel-packer-build-rack.sh

  windows-packer-build:
    name: Windows Packer Build
    runs-on: self-hosted
    needs: download-isos
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - run: |
          docker run --rm \
            --network host \
            --user root \
            -v "$PWD":/workspace \
            -w /workspace \
            ghcr.io/thadigus/turner-services-infrastructure:devcontainer \
            bash images/build-scripts/windows-packer-build-rack.sh

  kali-packer-build:
    name: Kali Packer Build
    runs-on: self-hosted
    needs: download-isos
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - run: |
          docker run --rm \
            --network host \
            --user root \
            -v "$PWD":/workspace \
            -w /workspace \
            ghcr.io/thadigus/turner-services-infrastructure:devcontainer \
            bash images/build-scripts/kali-packer-build-rack.sh
