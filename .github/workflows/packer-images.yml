name: Packer Images

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 1'

jobs:
  download-isos:
    name: Download ISOs
    runs-on: self-hosted
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - uses: ./.github/actions/materialize-secrets
        with:
          proton-pass-token: ${{ secrets.PROTON_PASS_ACCESS_TOKEN }}
          scope: packer
      - run: ansible-playbook --private-key "$TS_TURNERANS_SVC_SSH_PRIVKEY" images/download-isos.yml
      - name: Restore workspace ownership
        if: always()
        run: chown -R "$(stat -c '%u:%g' /__w)" "$GITHUB_WORKSPACE" || true

  ubuntu-packer-build:
    name: Ubuntu Packer Build
    runs-on: self-hosted
    needs: download-isos
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root
      network: host
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - uses: ./.github/actions/materialize-secrets
        with:
          proton-pass-token: ${{ secrets.PROTON_PASS_ACCESS_TOKEN }}
          scope: packer
      - run: bash images/build-scripts/ubuntu-packer-build-rack.sh
      - name: Restore workspace ownership
        if: always()
        run: chown -R "$(stat -c '%u:%g' /__w)" "$GITHUB_WORKSPACE" || true

  rhel-packer-build:
    name: RHEL Packer Build
    runs-on: self-hosted
    needs: download-isos
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root
      network: host
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - uses: ./.github/actions/materialize-secrets
        with:
          proton-pass-token: ${{ secrets.PROTON_PASS_ACCESS_TOKEN }}
          scope: packer
      - run: bash images/build-scripts/rhel-packer-build-rack.sh
      - name: Restore workspace ownership
        if: always()
        run: chown -R "$(stat -c '%u:%g' /__w)" "$GITHUB_WORKSPACE" || true

  windows-packer-build:
    name: Windows Packer Build
    runs-on: self-hosted
    needs: download-isos
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root
      network: host
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - uses: ./.github/actions/materialize-secrets
        with:
          proton-pass-token: ${{ secrets.PROTON_PASS_ACCESS_TOKEN }}
          scope: packer
      - run: bash images/build-scripts/windows-packer-build-rack.sh
      - name: Restore workspace ownership
        if: always()
        run: chown -R "$(stat -c '%u:%g' /__w)" "$GITHUB_WORKSPACE" || true

  kali-packer-build:
    name: Kali Packer Build
    runs-on: self-hosted
    needs: download-isos
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root
      network: host
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - uses: ./.github/actions/materialize-secrets
        with:
          proton-pass-token: ${{ secrets.PROTON_PASS_ACCESS_TOKEN }}
          scope: packer
      - run: bash images/build-scripts/kali-packer-build-rack.sh
      - name: Restore workspace ownership
        if: always()
        run: chown -R "$(stat -c '%u:%g' /__w)" "$GITHUB_WORKSPACE" || true
