name: Proxmox Prod Pulumi

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Proxmox Prod
    runs-on: self-hosted
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive

      - name: Materialize Ansible secrets
        uses: ./.github/actions/materialize-secrets
        with:
          proton-pass-token: ${{ secrets.PROTON_PASS_ACCESS_TOKEN }}
          scope: ansible

      - name: Run Pulumi up
        working-directory: deployment/pulumi-proxmox
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
        run: |
          export PATH="/home/turneradmin/.pulumi/bin:${PATH}"
          bash ./run-pulumi-up.sh --prod -u

      - name: Restore workspace ownership
        if: always()
        run: chown -R "$(stat -c '%u:%g' /__w)" "$GITHUB_WORKSPACE" || true
