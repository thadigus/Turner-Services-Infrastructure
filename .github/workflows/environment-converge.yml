name: Environment Converge

# Branch-driven environment convergence.

on:
  push:
    branches: ['**']
    paths:
      - 'scripts/run-k8s-app.sh'
      - 'services/k8s-apps/raw/**'
      - 'turner-services-sensitive-repo'
      - '.github/actions/materialize-secrets/**'
      - '.github/workflows/environment-converge.yml'
  schedule:
    - cron: '0 14 * * *'  # Daily at 14:00 UTC (1h after base-config-ansible)
  workflow_dispatch:
    inputs:
      env:
        description: Target cluster
        required: true
        type: choice
        options: [test, prod]
        default: prod
      bootstrap:
        description: Run bootstrap first
        required: false
        type: boolean
        default: false

concurrency:
  group: environment-converge
  cancel-in-progress: false

jobs:
  converge:
    runs-on: self-hosted
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive

      - name: Prepare network resolution
        run: |
          if [ -f turner-services-sensitive-repo/ci/hosts ]; then
            cat turner-services-sensitive-repo/ci/hosts >> /etc/hosts
          fi

      - name: Resolve target env
        id: env
        run: |
          case "${{ github.event_name }}" in
            schedule)          name=prod ;;
            workflow_dispatch) name="${{ inputs.env }}" ;;
            push)
              if [ "${{ github.ref }}" = "refs/heads/main" ]; then
                name=prod
              else
                name=test
              fi ;;
            *) echo "Unhandled event ${{ github.event_name }}"; exit 1 ;;
          esac
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "Target environment selected"

      - name: Prepare credentials
        uses: ./.github/actions/materialize-secrets
        with:
          proton-pass-token: ${{ secrets.PROTON_PASS_ACCESS_TOKEN }}
          scope: cluster
          kubeconfig-env: ${{ steps.env.outputs.name }}

      - name: Prepare environment
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap }}
        run: scripts/run-k8s-app.sh bootstrap --env ${{ steps.env.outputs.name }}

      - name: Converge state
        run: scripts/run-k8s-app.sh apply --env ${{ steps.env.outputs.name }}

      # Container ran as root and wrote to the bind-mounted workspace. Hand
      # ownership back to the runner host user so the next checkout works.
      - name: Restore workspace ownership
        if: always()
        run: chown -R "$(stat -c '%u:%g' /__w)" "$GITHUB_WORKSPACE" || true
