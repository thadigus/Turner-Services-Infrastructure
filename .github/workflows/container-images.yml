name: Container Images

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * 0"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: self-hosted
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root -v /var/run/docker.sock:/var/run/docker.sock
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: DevContainer Image
            file: images/iac-runner/Dockerfile
            tag: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
          - name: In-Cluster Dev Image
            file: images/in-cluster-dev/Dockerfile
            tag: ghcr.io/thadigus/turner-services-infrastructure:in-cluster-dev
    steps:
      - name: Ensure Docker CLI and Buildx
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null; then
            dnf install -y dnf-plugins-core
            dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
            dnf install -y docker-ce-cli docker-buildx-plugin
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ matrix.tag }}

      - name: Restore workspace ownership
        if: always()
        run: chown -R "$(stat -c '%u:%g' /__w)" "$GITHUB_WORKSPACE" || true
