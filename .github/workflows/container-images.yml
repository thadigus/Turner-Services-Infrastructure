name: Container Images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 0'

jobs:
  devcontainer:
    name: Build DevContainer Image
    runs-on: self-hosted
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root -v /var/run/docker.sock:/var/run/docker.sock
    permissions:
      contents: read
      packages: write
    steps:
      - name: Ensure docker CLI + buildx (bootstrap)
        run: |
          if ! command -v docker >/dev/null; then
            dnf install -y dnf-plugins-core
            dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
            dnf install -y docker-ce-cli docker-buildx-plugin
          fi
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: images/iac-runner/Dockerfile
          push: true
          tags: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      - name: Restore workspace ownership
        if: always()
        run: chown -R "$(stat -c '%u:%g' /__w)" "$GITHUB_WORKSPACE" || true

  in-cluster-dev:
    name: Build In-Cluster Dev Image
    runs-on: self-hosted
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root -v /var/run/docker.sock:/var/run/docker.sock
    permissions:
      contents: read
      packages: write
    steps:
      - name: Ensure docker CLI + buildx (bootstrap)
        run: |
          if ! command -v docker >/dev/null; then
            dnf install -y dnf-plugins-core
            dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
            dnf install -y docker-ce-cli docker-buildx-plugin
          fi
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: images/in-cluster-dev/Dockerfile
          push: true
          tags: ghcr.io/thadigus/turner-services-infrastructure:in-cluster-dev
      - name: Restore workspace ownership
        if: always()
        run: chown -R "$(stat -c '%u:%g' /__w)" "$GITHUB_WORKSPACE" || true
