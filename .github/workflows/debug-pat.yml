name: Debug PAT

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: self-hosted
    container:
      image: ghcr.io/thadigus/turner-services-infrastructure:devcontainer
      options: --user root
    steps:
      - name: Probe secret shape (no value emitted)
        env:
          PAT: ${{ secrets.PROTON_PASS_ACCESS_TOKEN }}
        run: |
          starts_with_pst=$(case "$PAT" in pst_*) echo yes;; *) echo no;; esac)
          has_double_colon=$(case "$PAT" in *::*) echo yes;; *) echo no;; esac)
          only_safe_chars=$(printf '%s' "$PAT" | LC_ALL=C grep -Pq '^[A-Za-z0-9_+/=:-]+$' && echo yes || echo no)
          echo "starts_with_pst: $starts_with_pst"
          echo "has_double_colon: $has_double_colon"
          echo "only_safe_chars: $only_safe_chars"
