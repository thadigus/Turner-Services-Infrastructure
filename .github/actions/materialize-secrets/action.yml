name: Materialize Secrets
description: Fetch deployment secrets live from Proton Pass and export TS_* env vars / file paths.

inputs:
  proton-pass-token:
    description: Proton Pass personal access token (pst_xxx::TOKENKEY).
    required: true
  vault:
    description: Proton Pass vault name holding the ts-* items.
    required: false
    default: Turner-Services-Infra
  scope:
    description: Which subset of secrets to materialize (ansible | cluster | packer | all).
    required: false
    default: all
  kubeconfig-env:
    description: For scope=cluster, which environment to prepare (test | prod).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Verify pass-cli is available
      shell: bash
      run: command -v pass-cli >/dev/null || { echo "pass-cli not installed in this image"; exit 1; }

    - name: Login to Proton Pass
      shell: bash
      env:
        PROTON_PASS_PAT: ${{ inputs.proton-pass-token }}
        PROTON_PASS_KEY_PROVIDER: fs
        PROTON_PASS_SESSION_DIR: ${{ runner.temp }}/pass-session
      run: |
        set -euo pipefail
        rm -rf "$PROTON_PASS_SESSION_DIR"
        mkdir -p "$PROTON_PASS_SESSION_DIR"
        pass-cli login --pat "$PROTON_PASS_PAT" >/dev/null
        echo "PROTON_PASS_KEY_PROVIDER=fs" >> "$GITHUB_ENV"
        echo "PROTON_PASS_SESSION_DIR=$PROTON_PASS_SESSION_DIR" >> "$GITHUB_ENV"

    - name: Fetch secrets
      shell: bash
      env:
        VAULT: ${{ inputs.vault }}
        SCOPE: ${{ inputs.scope }}
        KUBE_ENV: ${{ inputs.kubeconfig-env }}
      run: |
        set -euo pipefail
        umask 077

        fetch() {
          pass-cli item view --vault-name "$VAULT" --item-title "$1" --field "$2"
        }
        mask() { echo "::add-mask::$1"; }
        gha_secret_env() { mask "$2"; printf '%s<<__EOF__\n%s\n__EOF__\n' "$1" "$2" >> "$GITHUB_ENV"; }

        want_ansible=0; want_cluster=0; want_packer=0
        case "$SCOPE" in
          ansible)  want_ansible=1 ;;
          cluster|k8s-apps) want_cluster=1 ;;
          packer)   want_packer=1 ;;
          all)      want_ansible=1; want_cluster=1; want_packer=1 ;;
          *) echo "Unknown scope: $SCOPE" >&2; exit 1 ;;
        esac

        if [ "$want_ansible" = 1 ] || [ "$want_packer" = 1 ]; then
          mkdir -p "$RUNNER_TEMP/ssh"
          fetch ts-turnerans_svc-ssh-privkey note > "$RUNNER_TEMP/ssh/turnerans_svc_id_rsa"
          chmod 600 "$RUNNER_TEMP/ssh/turnerans_svc_id_rsa"
          echo "TS_TURNERANS_SVC_SSH_PRIVKEY=$RUNNER_TEMP/ssh/turnerans_svc_id_rsa" >> "$GITHUB_ENV"

          gha_secret_env TS_PROXMOX_TOKEN_SECRET "$(fetch ts-proxmox-packer-apitoken password)"
        fi

        if [ "$want_ansible" = 1 ]; then
          gha_secret_env TS_WIN_TURNERADMIN_PASSWD   "$(fetch ts-windows-turneradmin password)"
          gha_secret_env TS_WIN_TURNERANS_SVC_PASSWD "$(fetch ts-windows-turnerans_svc password)"
          gha_secret_env TS_UNIFI_API_KEY            "$(fetch ts-unifi-apikey password)"

          pbs_hook="turner-services-sensitive-repo/ci/materialize-pbs-answer.sh"
          if [ -x "$pbs_hook" ]; then
            VAULT="$VAULT" REPO_ROOT="$GITHUB_WORKSPACE" "$pbs_hook"
          fi
        fi

        if [ "$want_packer" = 1 ]; then
          gha_secret_env TS_PROXMOX_PACKER_USER      "$(fetch ts-proxmox-packer-apitoken username)"
          gha_secret_env TS_PROXMOX_PACKER_APIKEY    "$(fetch ts-proxmox-packer-apitoken password)"
          gha_secret_env TS_WIN_TURNERANS_SVC_PASSWD "$(fetch ts-windows-turnerans_svc password)"
          gha_secret_env TS_WIN_TURNERADMIN_PASSWD   "$(fetch ts-windows-turneradmin password)"
        fi

        if [ "$want_cluster" = 1 ]; then
          [ -n "$KUBE_ENV" ] || { echo "scope=cluster requires kubeconfig-env (test|prod)"; exit 1; }
          case "$KUBE_ENV" in test|prod) ;; *) echo "kubeconfig-env must be test or prod"; exit 1 ;; esac
          hook="turner-services-sensitive-repo/ci/materialize-cluster-secrets.sh"
          [ -x "$hook" ] || { echo "Missing sensitive cluster secret hook: $hook" >&2; exit 1; }
          VAULT="$VAULT" KUBE_ENV="$KUBE_ENV" "$hook"
        fi

